<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Foodie</title>
  <link rel="stylesheet" href="foodstyle.css">
</head>

<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">🍔 Foodie</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Menu</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    
    <div class="hero-text">
      <span class="tag">🎉 Free delivery on orders over $30</span>
      
      <!-- ✅ Typing text (JS will fill this) -->
      <h1 id="typing-text"></h1>

      <p>
        Order your favorite meals from the best restaurants in town.
        Fresh ingredients, prepared with love, delivered to your door.
      </p>

      <div class="buttons">
        <button class="btn-primary">Order Now →</button>
        <button class="btn-secondary">View Menu</button>
      </div>

      <div class="stats">
        <div>
          <h3>500+</h3>
          <p>Restaurants</p>
        </div>
        <div>
          <h3>50k+</h3>
          <p>Happy Customers</p>
        </div>
        <div>
          <h3>4.8★</h3>
          <p>Average Rating</p>
        </div>
      </div>
    </div>

    <div class="hero-image">
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" alt="delivery">
    </div>

  </section>

  <!-- ✅ MENU SECTION ADDED -->
  <section class="menu">
    <h2>Our Popular Menu 🍽️</h2>

    <div class="menu-container" id="menu-container">
      <!-- JS will load food items here -->
    </div>
  </section>

  <!-- ✅ Always keep JS at bottom -->
  <script src="foodscript.js"></script>

</body>
</html>
